name: E2E Tests

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    branches:
      - test
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Java (required by Firebase emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase emulators
        run: firebase emulators:start --only auth,firestore --project demo-bookit &
        env:
          CI: "true"

      - name: Wait for emulators to be ready
        run: npx wait-on http://localhost:4000 --timeout 60000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          NEXT_PUBLIC_USE_EMULATOR: "true"
          NEXT_PUBLIC_FIREBASE_API_KEY: "demo-key"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "demo-bookit"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "demo-bookit.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "demo-bookit.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:demo"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
